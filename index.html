<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>❤️</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
.text {
    position: absolute;
    font-size: 14px;
    color: pink;
}
</style>
</head>
<body>

<script>
const texts = ["我想你了","爱你","早点睡","好好吃饭","我在","别熬夜","天天开心"];

let elements = [];

// ❤️ 爱心坐标
function heart(t) {
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    return {x,y};
}

// 生成爱心（直接出现）
function createHeart() {
    for(let i=0;i<200;i++){
        let t = Math.random()*Math.PI*2;
        let p = heart(t);

        let el = document.createElement("div");
        el.className = "text";
        el.innerText = texts[Math.floor(Math.random()*texts.length)];

        el.style.left = (window.innerWidth/2 + p.x*10) + "px";
        el.style.top = (window.innerHeight/2 + p.y*10) + "px";

        document.body.appendChild(el);
        elements.push(el);
    }
}

// 删除爱心
function removeHeart(){
    elements.forEach(e=>e.remove());
    elements = [];
}

// 随机文字
function randomText(){
    let el = document.createElement("div");
    el.className = "text";
    el.innerText = texts[Math.floor(Math.random()*texts.length)];

    el.style.left = Math.random()*window.innerWidth + "px";
    el.style.top = Math.random()*window.innerHeight + "px";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),2000);
}

// 流程
createHeart();                // 直接出现爱心
setTimeout(removeHeart,3000); // 3秒消失
setTimeout(()=>{
    setInterval(randomText,150); // 随机出现
},3200);

</script>

</body>
</html>
