<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>❤️</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* 文字卡片 */
.text {
    position: absolute;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 16px;
    color: white;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s;
}

.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>
<body>

<script>
const texts = [
    "我想你了","爱你","好好吃饭","早点睡",
    "喝水哦","天天开心","顺顺利利",
    "我在","别熬夜","爱你三千遍"
];

const colors = [
    "#ff4d6d","#ff66cc","#66ffcc","#66ccff","#ffff66"
];

let elements = [];

// ❤️ 爱心函数
function heart(t) {
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    return {x,y};
}

// ❤️ 顺序生成爱心
function createHeart() {
    let i = 0;
    let total = 180;

    let interval = setInterval(()=>{
        if(i >= total){
            clearInterval(interval);
            return;
        }

        let t = (i / total) * Math.PI * 2;
        let p = heart(t);

        let el = document.createElement("div");
        el.className = "text";
        el.innerText = texts[i % texts.length];

        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.left = (window.innerWidth/2 + p.x*11) + "px";
        el.style.top = (window.innerHeight/2 + p.y*11) + "px";

        document.body.appendChild(el);
        elements.push(el);

        setTimeout(()=>el.classList.add("show"),10);

        i++;
    },15); // 更快生成
}

// 💥 爱心消失
function removeHeart(){
    elements.forEach(e=>e.style.opacity = 0);
    setTimeout(()=>{
        elements.forEach(e=>e.remove());
        elements = [];
    },300);
}

// 🔥 高密度飘字（重点优化）
function randomText(){
    // 一次生成多个（提高密度）
    for(let i=0;i<5;i++){

        let el = document.createElement("div");
        el.className = "text show";
        el.innerText = texts[Math.floor(Math.random()*texts.length)];

        el.style.background = colors[Math.floor(Math.random()*colors.length)];

        // 字体更大（重点）
        el.style.fontSize = (18 + Math.random()*12) + "px";

        el.style.left = Math.random()*window.innerWidth + "px";
        el.style.top = Math.random()*window.innerHeight + "px";

        document.body.appendChild(el);

        // 自动消失
        setTimeout(()=>{
            el.style.opacity = 0;
            setTimeout(()=>el.remove(),300);
        },1500);
    }
}

// 🚀 执行流程
createHeart();                     // 爱心
setTimeout(removeHeart,4000);      // 消失
setTimeout(()=>{
    // 高频率 + 多生成 = 爆满屏
    setInterval(randomText,80);
},4200);

</script>

</body>
</html>
