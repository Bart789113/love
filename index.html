<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>❤️ 给你的小惊喜</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:"微软雅黑";
}

/* 背景渐变流动 */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#ff0057,#00f0ff,#ff0,#ff0057);
  animation:bg 10s linear infinite;
  z-index:-1;
  opacity:0.2;
}
@keyframes bg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-50%,-50%);}
  100%{transform:translate(0,0);}
}

/* 中间文字 */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  font-size:30px;
  text-align:center;
  text-shadow:0 0 20px #ff4d6d;
}

/* 爱心 */
.heart{
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  transform:rotate(45deg);
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  background:red;
  border-radius:50%;
}

.heart::before{ top:-5px;}
.heart::after{ left:-5px;}

/* 飘字 */
.text{
  position:absolute;
  color:#fff;
  font-size:14px;
  white-space:nowrap;
  animation:float 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:1;}
  100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- 音乐 -->
<audio autoplay loop>
  <source src="https://www.ytmp3.cn/down/73388.mp3" type="audio/mpeg">
</audio>

<div class="center" id="text"></div>

<script>
// 打字效果
let str="❤️ 我喜欢你 ❤️";
let i=0;
function typing(){
  if(i<str.length){
    document.getElementById("text").innerHTML+=str[i];
    i++;
    setTimeout(typing,150);
  }
}
typing();

// 飘字
let words=["我爱你","喜欢你","❤️","永远在一起","Love"];
setInterval(()=>{
  let t=document.createElement("div");
  t.className="text";
  t.innerText=words[Math.floor(Math.random()*words.length)];
  t.style.left=Math.random()*window.innerWidth+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),10000);
},500);

// 点击生成爱心爆炸
document.onclick=function(e){
  for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.style.left=e.clientX+"px";
    heart.style.top=e.clientY+"px";
    heart.style.background=`hsl(${Math.random()*360},100%,60%)`;
    document.body.appendChild(heart);

    let x=(Math.random()-0.5)*200;
    let y=(Math.random()-0.5)*200;

    heart.animate([
      {transform:`translate(0,0) rotate(45deg)`,opacity:1},
      {transform:`translate(${x}px,${y}px) rotate(45deg)`,opacity:0}
    ],{
      duration:1000
    });

    setTimeout(()=>heart.remove(),1000);
  }
};
</script>

</body>
</html>
