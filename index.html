<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>❤️</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: "微软雅黑";
}

/* 卡片整体 */
.card {
    position: absolute;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s;
}

/* 顶部栏 */
.bar {
    height: 20px;
    background: #eee;
    display: flex;
    align-items: center;
    padding-left: 5px;
}

/* 三个按钮 */
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
}
.red { background: #ff5f57; }
.yellow { background: #ffbd2e; }
.green { background: #28c840; }

/* 内容 */
.content {
    padding: 6px 12px;
    color: white;
    font-size: 16px;
    white-space: nowrap;
}

/* 显示动画 */
.show {
    opacity: 1;
    transform: scale(1);
}
</style>
</head>
<body>

<script>
const texts = [
    "我想你了","爱你","好好吃饭","早点睡",
    "喝水哦","天天开心","顺顺利利",
    "我在","别熬夜","爱你三千遍"
];

const colors = [
    "#ff4d6d","#ff66cc","#66ffcc","#66ccff","#ffff66"
];

let elements = [];

// ❤️ 爱心函数
function heart(t) {
    let x = 16 * Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
    return {x,y};
}

// 创建卡片
function createCard(text) {
    let card = document.createElement("div");
    card.className = "card";

    let bar = document.createElement("div");
    bar.className = "bar";

    let red = document.createElement("div");
    red.className = "dot red";

    let yellow = document.createElement("div");
    yellow.className = "dot yellow";

    let green = document.createElement("div");
    green.className = "dot green";

    bar.appendChild(red);
    bar.appendChild(yellow);
    bar.appendChild(green);

    let content = document.createElement("div");
    content.className = "content";
    content.innerText = text;

    // 随机背景色
    content.style.background = colors[Math.floor(Math.random()*colors.length)];

    card.appendChild(bar);
    card.appendChild(content);

    return card;
}

// ❤️ 爱心生成（顺序）
function createHeart() {
    let i = 0;
    let total = 180;

    let interval = setInterval(()=>{
        if(i >= total){
            clearInterval(interval);
            return;
        }

        let t = (i / total) * Math.PI * 2;
        let p = heart(t);

        let card = createCard(texts[i % texts.length]);

        card.style.left = (window.innerWidth/2 + p.x*11) + "px";
        card.style.top = (window.innerHeight/2 + p.y*11) + "px";

        document.body.appendChild(card);
        elements.push(card);

        setTimeout(()=>card.classList.add("show"),10);

        i++;
    },15);
}

// 💥 爱心消失
function removeHeart(){
    elements.forEach(e=>e.style.opacity = 0);
    setTimeout(()=>{
        elements.forEach(e=>e.remove());
        elements = [];
    },300);
}

// 🔥 随机卡片（高密度）
function randomCards(){
    for(let i=0;i<5;i++){
        let card = createCard(texts[Math.floor(Math.random()*texts.length)]);

        card.style.left = Math.random()*window.innerWidth + "px";
        card.style.top = Math.random()*window.innerHeight + "px";

        // 随机大小（更像抖音）
        card.style.transform = "scale(" + (0.8 + Math.random()*0.8) + ")";

        document.body.appendChild(card);

        setTimeout(()=>card.classList.add("show"),10);

        // 消失
        setTimeout(()=>{
            card.style.opacity = 0;
            setTimeout(()=>card.remove(),300);
        },1500);
    }
}

// 🚀 执行
createHeart();
setTimeout(removeHeart,4000);
setTimeout(()=>{
    setInterval(randomCards,80);
},4200);

</script>

</body>
</html>
